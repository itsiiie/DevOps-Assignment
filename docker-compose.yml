version: '3.8'

services:
  backend:
    build: .
    container_name: chat-backend
    expose:
      - "8000"
    restart: always

  nginx:
    image: nginx:alpine
    container_name: chat-nginx
    ports:
      - "80:80"
    volumes:
      # TODO: Candidates need to map the frontend directory correctly to serve the HTML
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: always
